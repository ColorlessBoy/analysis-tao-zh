<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis I · 陶哲轩实分析</title>

  <!-- PWA / Safari standalone -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Analysis I">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a2e">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Georgia:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- MathJax 3.x -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>


  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Analysis I">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <button id="hamburger" class="hamburger-btn" aria-label="打开导航">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <a class="site-title" href="#">
          <span class="zh-only">实分析</span>
          <span class="en-only">Analysis I</span>
        </a>

      <!-- Reading progress -->
      <div class="reading-progress" id="reading-progress" aria-live="polite">
        <span class="progress-text" id="progress-text"></span>
      </div>

      <div class="header-controls">
        <!-- Search trigger -->
        <button id="search-btn" class="ctrl-btn" aria-label="搜索" title="搜索 (/)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <!-- Bookmark toggle -->
        <button id="bookmark-btn" class="ctrl-btn" aria-label="添加书签" title="书签">
          <svg class="icon-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          <svg class="icon-bookmark-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
        <!-- Language toggle -->
        <button id="lang-toggle" class="ctrl-btn" aria-label="切换语言" title="切换语言">
          <span class="lang-label">中/EN</span>
        </button>
        <!-- Theme toggle -->
        <button id="theme-toggle" class="ctrl-btn" aria-label="切换主题">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── Two-column layout ─────────────────────────────── -->
  <div class="page-body">

    <!-- Sidebar with collapsible TOC -->
    <aside class="sidebar" id="sidebar" aria-label="章节导航">
      <div class="sidebar-inner">
        <!-- TOC will be rendered here -->
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content" tabindex="-1">
      <!-- Breadcrumb -->
      <nav class="breadcrumb" id="breadcrumb" aria-label="面包屑"></nav>
      <!-- Section content rendered here -->
      <div id="section-content"></div>
    </main>
  </div>

  <!-- ── Search overlay ────────────────────────────────── -->
  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="搜索">
    <div class="search-box">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="搜索章节内容…" autocomplete="off" autocorrect="off" spellcheck="false">
        <kbd class="search-esc-hint">Esc</kbd>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- ── Toast container ───────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="js/math.js"></script>
  <script src="js/toc.js"></script>
  <script src="js/bookmarks.js"></script>
  <script src="js/search.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>

  <footer>
    <p>Created: <span id="created-time"></span></p>
  </footer>
</body>
</html>
